name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check --output-format=github .
      - name: ruff format check
        run: ruff format --check .

  smoke-import:
    name: Smoke import the scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install runtime requirements
        run: pip install -r requirements.txt
      - name: Import openstack-backup.py (catches syntax + missing imports)
        run: python -c "import importlib.util; spec = importlib.util.spec_from_file_location('m', 'openstack-backup.py'); m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m)"
        env:
          OS_AUTH_URL: ''
          OS_USERNAME: ''
          OS_PASSWORD: ''
          OS_PROJECT_NAME: ''
      - name: Import openstack-verify.py
        run: python -c "import importlib.util; spec = importlib.util.spec_from_file_location('m', 'openstack-verify.py'); m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m)"
        env:
          OS_AUTH_URL: ''
          OS_USERNAME: ''
          OS_PASSWORD: ''
          OS_PROJECT_NAME: ''

  workflows-lint:
    name: Lint GitHub workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  python-deps-audit:
    name: Audit Python deps for vulnerabilities (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit
        run: pip-audit --strict --requirement requirements.txt
