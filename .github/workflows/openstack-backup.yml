name: OpenStack Automatic Backup

on:
  # Scheduled runs are disabled by default in this template.
  # To enable, uncomment the following lines:
  # schedule:
  #   - cron: '0 2 * * *'  # Daily at 2:00 AM UTC
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'Number of days to retain backups'
        required: false
        default: '14'
      use_snapshot_method:
        description: 'Use snapshot method for attached volume backups (true/false)'
        required: false
        default: 'true'
      wait_for_backup:
        description: 'Wait for backup completion before cleanup - sync mode (true/false)'
        required: false
        default: 'false'
      backup_concurrency:
        description: 'Max parallel volume backup workers'
        required: false
        default: '5'
      resource_timeout:
        description: 'Max seconds to wait for snapshot/temp-volume state transitions'
        required: false
        default: '3600'
      backup_timeout:
        description: 'Max seconds to wait for a backup to complete (compression + Swift upload can be very long)'
        required: false
        default: '86400'
      job_timeout_minutes:
        description: 'GitHub Actions job timeout in minutes — increase for sync mode on slow platforms'
        required: false
        default: '360'

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.JOB_TIMEOUT_MINUTES || github.event.inputs.job_timeout_minutes || '360') }}
    container:
      image: ghcr.io/net-architect-cloud/os-backup-scheduler:latest
    strategy:
      matrix:
        region: [dc3-a, dc4-a]
      fail-fast: false

    steps:
      - name: Run backup for ${{ matrix.region }}
        id: backup
        env:
          # Organization variables (non-sensitive)
          OS_AUTH_URL: ${{ vars.OS_AUTH_URL }}
          OS_USER_DOMAIN_NAME: ${{ vars.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ vars.OS_PROJECT_DOMAIN_NAME }}
          OS_REGION_NAME: ${{ matrix.region }}
          OS_IDENTITY_API_VERSION: ${{ vars.OS_IDENTITY_API_VERSION }}
          # Secrets (sensitive)
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          # Backup behaviour (overridable via repo variables or manual dispatch inputs)
          RETENTION_DAYS: ${{ vars.RETENTION_DAYS || github.event.inputs.retention_days || '14' }}
          USE_SNAPSHOT_METHOD: ${{ vars.USE_SNAPSHOT_METHOD || github.event.inputs.use_snapshot_method || 'true' }}
          WAIT_FOR_BACKUP: ${{ vars.WAIT_FOR_BACKUP || github.event.inputs.wait_for_backup || 'false' }}
          BACKUP_CONCURRENCY: ${{ vars.BACKUP_CONCURRENCY || github.event.inputs.backup_concurrency || '5' }}
          RESOURCE_TIMEOUT: ${{ vars.RESOURCE_TIMEOUT || github.event.inputs.resource_timeout || '3600' }}
          BACKUP_TIMEOUT: ${{ vars.BACKUP_TIMEOUT || github.event.inputs.backup_timeout || '86400' }}
          # Zabbix monitoring (optional — skip if secrets not set)
          ZABBIX_SERVER: ${{ secrets.ZABBIX_SERVER }}
          ZABBIX_HOST: ${{ secrets.ZABBIX_HOST }}
        run: |
          chmod 666 "$GITHUB_STEP_SUMMARY"
          echo "Running backup for region: ${{ matrix.region }}"
          /app/openstack-backup.py

  # Notification job - runs only on backup failure
  notify:
    needs: backup
    if: failure()
    uses: ./.github/workflows/notify.yml
    secrets: inherit
    with:
      emoji: '❌'
      message: 'OpenStack backup failed'
      color: 'danger'
      color_hex: 'dc3545'
      issue_title: '❌ OpenStack Backup Failed'
      issue_label: 'backup-failure'
