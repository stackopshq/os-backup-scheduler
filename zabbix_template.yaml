zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications

  templates:
    - uuid: 6f3c2a1e8b4d5f7a9c0e2b4d6f8a0c2e
      template: tpl-os-backup
      name: OpenStack Automatic Backup
      description: |
        Monitors OpenStack backup jobs running via the os-backup-scheduler.
        Items are fed via Zabbix sender (trapper) at the end of each backup
        and verification run. One host per project × region combination.

        Expected host naming: {ZABBIX_HOST}-{OS_REGION_NAME}
        Example: backup-clientA-dc3-a

      groups:
        - name: Templates/Applications

      items:
        # ── Backup items ──────────────────────────────────────────────────
        - uuid: 1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d
          name: 'Backup: instances backed up'
          key: backup.instances.ok
          type: TRAP
          value_type: UNSIGNED
          units: instances
          description: Number of instances successfully backed up in the last run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: backup

        - uuid: 2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e
          name: 'Backup: volumes backed up'
          key: backup.volumes.ok
          type: TRAP
          value_type: UNSIGNED
          units: volumes
          description: Number of volumes successfully backed up in the last run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: backup

        - uuid: 3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f
          name: 'Backup: errors'
          key: backup.errors
          type: TRAP
          value_type: UNSIGNED
          description: Number of errors encountered during the last backup run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: backup

        - uuid: 4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a
          name: 'Backup: duration'
          key: backup.duration
          type: TRAP
          value_type: UNSIGNED
          units: s
          description: Total duration of the last backup run in seconds.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: backup

        - uuid: 5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b
          name: 'Backup: heartbeat'
          key: backup.heartbeat
          type: TRAP
          value_type: UNSIGNED
          description: Unix timestamp of the last successful backup run. Used for Dead Man Switch detection.
          history: 90d
          trends: 0
          tags:
            - tag: component
              value: backup

        # ── Verification items ────────────────────────────────────────────
        - uuid: 6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c
          name: 'Verify: backups OK'
          key: verify.ok
          type: TRAP
          value_type: UNSIGNED
          units: backups
          description: Number of backups verified as healthy in the last verification run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: verification

        - uuid: 7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d
          name: 'Verify: stuck backups'
          key: verify.stuck
          type: TRAP
          value_type: UNSIGNED
          description: Number of backups still stuck in a transient state during the last verification run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: verification

        - uuid: 8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e
          name: 'Verify: errors'
          key: verify.errors
          type: TRAP
          value_type: UNSIGNED
          description: Number of backups in error state during the last verification run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: verification

        - uuid: 9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f
          name: 'Verify: heartbeat'
          key: verify.heartbeat
          type: TRAP
          value_type: UNSIGNED
          description: Unix timestamp of the last verification run. Used for Dead Man Switch detection.
          history: 90d
          trends: 0
          tags:
            - tag: component
              value: verification

      triggers:
        # ── Backup triggers ───────────────────────────────────────────────
        - uuid: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
          expression: 'last(/tpl-os-backup/backup.errors)>0'
          name: 'Backup errors on {HOST.NAME}'
          priority: AVERAGE
          description: One or more errors occurred during the last backup run.
          tags:
            - tag: scope
              value: availability

        - uuid: b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7
          expression: 'nodata(/tpl-os-backup/backup.heartbeat,90000)=1'
          name: 'Backup job not run in 25h on {HOST.NAME}'
          priority: HIGH
          description: |
            No backup heartbeat received in the last 25 hours.
            The scheduled backup job may not have run (cron issue, GitHub incident, quota exceeded).
          tags:
            - tag: scope
              value: availability

        # ── Verification triggers ─────────────────────────────────────────
        - uuid: c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8
          expression: 'last(/tpl-os-backup/verify.errors)>0'
          name: 'Backup verification errors on {HOST.NAME}'
          priority: AVERAGE
          description: One or more backups are in error state according to the verification run.
          tags:
            - tag: scope
              value: availability

        - uuid: d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9
          expression: 'last(/tpl-os-backup/verify.stuck)>0'
          name: 'Stuck backups detected on {HOST.NAME}'
          priority: WARNING
          description: One or more backups are stuck in a transient state (queued, saving, creating, backing-up).
          tags:
            - tag: scope
              value: availability

        - uuid: e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0
          expression: 'nodata(/tpl-os-backup/verify.heartbeat,90000)=1'
          name: 'Verification job not run in 25h on {HOST.NAME}'
          priority: AVERAGE
          description: No verification heartbeat received in the last 25 hours.
          tags:
            - tag: scope
              value: availability
