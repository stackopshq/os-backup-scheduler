zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7c8f25e7ce87417aa2b94e35e55e173b
      name: Templates/Applications

  templates:
    - uuid: 2c7ef27670154e25ae6a5337ba92b9d4
      template: tpl-os-backup
      name: OpenStack Automatic Backup
      description: |
        Monitors OpenStack backup jobs running via the os-backup-scheduler.
        Items are fed via Zabbix sender (trapper) at the end of each backup
        and verification run. One host per project x region combination.

        Expected host naming: {ZABBIX_HOST}-{OS_REGION_NAME}
        Example: backup-clientA-dc3-a

      groups:
        - name: Templates/Applications

      items:
        - uuid: e5c041b4429e422182ea50868cebc00d
          name: 'Backup: instances backed up'
          key: backup.instances.ok
          type: TRAP
          value_type: UNSIGNED
          units: instances
          description: Number of instances successfully backed up in the last run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: backup

        - uuid: 9b4fcf1b2b7441dea81c67107cad5221
          name: 'Backup: volumes backed up'
          key: backup.volumes.ok
          type: TRAP
          value_type: UNSIGNED
          units: volumes
          description: Number of volumes successfully backed up in the last run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: backup

        - uuid: 7a27ac9f48b548a59bdfd28e554b7b64
          name: 'Backup: errors'
          key: backup.errors
          type: TRAP
          value_type: UNSIGNED
          description: Number of errors encountered during the last backup run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: backup
          triggers:
            - uuid: bd09000e1d2d47468e69ae3488d0413f
              expression: 'last(/tpl-os-backup/backup.errors)>0'
              name: 'Backup errors on {HOST.NAME}'
              priority: AVERAGE
              description: One or more errors occurred during the last backup run.
              tags:
                - tag: scope
                  value: availability

        - uuid: e7dabdcb0f2b456abd9a641b466d26f4
          name: 'Backup: duration'
          key: backup.duration
          type: TRAP
          value_type: UNSIGNED
          units: s
          description: Total duration of the last backup run in seconds.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: backup

        - uuid: 641292b2074949d4948c678bef32b887
          name: 'Backup: run started'
          key: backup.run_started_at
          type: TRAP
          value_type: UNSIGNED
          units: unixtime
          description: |
            Unix timestamp emitted at the very start of the backup script, before
            authenticating to OpenStack. Pair with backup.heartbeat to detect
            runs that started but never finished (crash mid-flight).
          history: 90d
          trends: '0'
          tags:
            - tag: component
              value: backup

        - uuid: 6972d08035c3403a8997064865234e5b
          name: 'Backup: heartbeat'
          key: backup.heartbeat
          type: TRAP
          value_type: UNSIGNED
          units: unixtime
          description: Unix timestamp of the last backup run. Used for Dead Man Switch detection. Rendered as a human-readable date in the UI via the `unixtime` unit.
          history: 90d
          trends: '0'
          tags:
            - tag: component
              value: backup
          triggers:
            - uuid: 04809d0869d1455e9b02b7026fbab37d
              expression: 'nodata(/tpl-os-backup/backup.heartbeat,90000)=1'
              name: 'Backup job not run in 25h on {HOST.NAME}'
              priority: HIGH
              description: |
                No backup heartbeat received in the last 25 hours.
                The scheduled backup job may not have run (cron issue, GitHub incident, quota exceeded).
              tags:
                - tag: scope
                  value: availability
            - uuid: 703987bb99594fb9b379098982c32126
              expression: 'last(/tpl-os-backup/backup.heartbeat)>0 and last(/tpl-os-backup/backup.run_started_at)-last(/tpl-os-backup/backup.heartbeat)>7200'
              name: 'Backup run started but did not finish on {HOST.NAME}'
              priority: WARNING
              description: |
                The backup run started more than 2 hours ago but produced no
                heartbeat to mark its completion. Typical causes: hang while
                creating a snapshot, OpenStack API slow path, GitHub Actions
                runner terminated mid-run. Check the latest workflow run.
              tags:
                - tag: scope
                  value: availability

        - uuid: eedb75e0edca4cacb1872da67535b33b
          name: 'Verify: backups OK'
          key: verify.ok
          type: TRAP
          value_type: UNSIGNED
          units: backups
          description: Number of backups verified as healthy in the last verification run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: verification

        - uuid: bf507c90b14746d6b2032bf452c895f5
          name: 'Verify: stuck backups'
          key: verify.stuck
          type: TRAP
          value_type: UNSIGNED
          description: Number of backups stuck in a transient state.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: verification
          triggers:
            - uuid: 3b7a85c625d943e6bb85454407edf2c3
              expression: 'last(/tpl-os-backup/verify.stuck)>0'
              name: 'Stuck backups detected on {HOST.NAME}'
              priority: WARNING
              description: One or more backups are stuck in a transient state (queued, saving, creating, backing-up).
              tags:
                - tag: scope
                  value: availability

        - uuid: 4aef4bc8a283488aa7b732e1842c3f92
          name: 'Verify: errors'
          key: verify.errors
          type: TRAP
          value_type: UNSIGNED
          description: Number of backups in error state during the last verification run.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: verification
          triggers:
            - uuid: 90b03b5c78614cd681065aa2cd468951
              expression: 'last(/tpl-os-backup/verify.errors)>0'
              name: 'Backup verification errors on {HOST.NAME}'
              priority: AVERAGE
              description: One or more backups are in error state according to the verification run.
              tags:
                - tag: scope
                  value: availability

        - uuid: abe21d508cfd4338a87fa456ef61329f
          name: 'Verify: temp_* resource count'
          key: verify.temp_count
          type: TRAP
          value_type: UNSIGNED
          description: Number of temp_* (volumes + snapshots) still present after the verification cleanup. Persistent non-zero values indicate orphan resources consuming storage.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: verification

        - uuid: 657b01849c1341329271658b5ec14088
          name: 'Verify: temp_* resource size'
          key: verify.temp_gb
          type: TRAP
          value_type: UNSIGNED
          units: 'GB'
          description: Total size of temp_* resources still present after the verification cleanup, in GB. Used to estimate the billing impact of orphan resources.
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: verification
          triggers:
            - uuid: 862ed26dca134754bdc9d5f7e3c605ec
              expression: 'min(/tpl-os-backup/verify.temp_gb,2h)>500'
              name: 'Persistent temp_* orphans > 500 GB on {HOST.NAME}'
              priority: WARNING
              description: |
                More than 500 GB of temp_* resources have persisted across at least
                2 hours of verification runs. These are orphans the regular cleanup
                cannot reclaim (typically stuck states or in-progress backups that
                never completed). Use cleanup-stuck.yml after manual inspection.
              tags:
                - tag: scope
                  value: capacity

        - uuid: 24c12ae248e6494c817c4e04984a61bb
          name: 'Verify: run started'
          key: verify.run_started_at
          type: TRAP
          value_type: UNSIGNED
          units: unixtime
          description: |
            Unix timestamp emitted at the very start of the verify script, before
            authenticating to OpenStack. Pair with verify.heartbeat to detect
            runs that started but never finished.
          history: 90d
          trends: '0'
          tags:
            - tag: component
              value: verification

        - uuid: f80976f415bc442ba6fb64cabb73c627
          name: 'Verify: heartbeat'
          key: verify.heartbeat
          type: TRAP
          value_type: UNSIGNED
          units: unixtime
          description: Unix timestamp of the last verification run. Used for Dead Man Switch detection. Rendered as a human-readable date in the UI via the `unixtime` unit.
          history: 90d
          trends: '0'
          tags:
            - tag: component
              value: verification
          triggers:
            - uuid: 9f56fbf2e675467d9fac932fcf8aa212
              expression: 'nodata(/tpl-os-backup/verify.heartbeat,90000)=1'
              name: 'Verification job not run in 25h on {HOST.NAME}'
              priority: AVERAGE
              description: No verification heartbeat received in the last 25 hours.
              tags:
                - tag: scope
                  value: availability
            - uuid: 94f1093591ca4c35ae853df7d7939801
              expression: 'last(/tpl-os-backup/verify.heartbeat)>0 and last(/tpl-os-backup/verify.run_started_at)-last(/tpl-os-backup/verify.heartbeat)>7200'
              name: 'Verify run started but did not finish on {HOST.NAME}'
              priority: WARNING
              description: |
                The verify run started more than 2 hours ago but produced no
                heartbeat to mark its completion. Typical causes: hang while
                listing volumes/backups, OpenStack API slow path, GitHub
                Actions runner terminated mid-run.
              tags:
                - tag: scope
                  value: availability
